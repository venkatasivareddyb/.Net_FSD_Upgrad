<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Electronics Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container py-5">
    <h1 class="text-center mb-4">Electronics Store</h1>
    <div class="row g-4">
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 bg-light">
          <img src="img1.jpg" class="card-img-top" alt="Product 1">
          <div class="card-body text-center">
            <h5 class="card-title">Smartphone</h5>
            <p class="card-text">Latest model with advanced features.</p>
            <div class="d-grid gap-2">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-dark">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 bg-light">
          <img src="img2.jpg" class="card-img-top" alt="Product 2">
          <div class="card-body text-center">
            <h5 class="card-title">Laptop</h5>
            <p class="card-text">Powerful performance for work and play.</p>
            <div class="d-grid gap-2">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-dark">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 bg-light">
          <img src="img3.jpg" class="card-img-top" alt="Product 3">
          <div class="card-body text-center">
            <h5 class="card-title">Headphones</h5>
            <p class="card-text">Noise-cancelling with superior sound quality.</p>
            <div class="d-grid gap-2">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-dark">View Details</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100 bg-light">
          <img src="img4.jpg" class="card-img-top" alt="Product 4">
          <div class="card-body text-center">
            <h5 class="card-title">Smartwatch</h5>
            <p class="card-text">Track fitness and stay connected.</p>
            <div class="d-grid gap-2">
              <button class="btn btn-primary">Add to Cart</button>
              <button class="btn btn-outline-dark">View Details</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
