<!DOCTYPE html>
<html lang="en">
<head>
    <title>Media Blog</title>
</head>
<body>
    <header>
        <h1>My Media Blog</h1>
    </header>

    <nav>
        <input type="search" placeholder="Search posts...">
    </nav>

    <main>
        <article>
            <h2>Exploring Web Development</h2>
            <p>Author: Venkata | Date: 26 Feb 2026</p>
            <img src="webdev.jpg" alt="Web Development Image" width="300"><br><br>
            <audio controls loop>
                <source src="audio.mp3" type="audio/mpeg">
            </audio><br><br>
            <video controls width="400" poster="poster.jpg">
                <source src="video.mp4" type="video/mp4">
            </video>
        </article>
    </main>

    <footer>
        <form>
            <label for="subscribe">Subscribe for Updates:</label>
            <input type="email" id="subscribe" name="subscribe" required>
            <input type="submit" value="Subscribe">
        </form>
    </footer>
</body>
</html>
