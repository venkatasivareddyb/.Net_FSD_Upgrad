<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bank Account Opening</title>
</head>
<body>
    <header>
        <h1>Open Your Savings Account</h1>
    </header>

    <section>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required><br><br>

            <label for="pan">PAN Number:</label>
            <input type="text" id="pan" name="pan" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" required><br><br>

            <label for="ifsc">IFSC Code:</label>
            <input type="text" id="ifsc" name="ifsc" pattern="[A-Z]{4}[0-9]{7}" required><br><br>

            <label for="account">Account Type:</label>
            <input list="types" id="account" name="account" required>
            <datalist id="types">
                <option value="Savings">
                <option value="Current">
                <option value="Salary">
            </datalist><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required><br><br>

            <label for="income">Monthly Income:</label>
            <input type="number" id="income" name="income" step="1000" required><br><br>

            <label for="idproof">Upload ID Proof:</label>
            <input type="file" id="idproof" name="idproof" required><br><br>

            <input type="submit" value="Open Account">
        </form>
    </section>
</body>
</html>
