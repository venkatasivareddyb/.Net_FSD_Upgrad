<!DOCTYPE html>
<html lang="en">
<head>
    <title>SecureBank Dashboard</title>
    <link rel="stylesheet" href="D3_T4_style.css">
    <style>
        .highlight {
            background: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>SecureBank</h1>
    </header>

    <aside>
        <nav>
            <ul>
                <li>Dashboard</li>
                <li>Accounts</li>
                <li>Transactions</li>
                <li>Settings</li>
            </ul>
        </nav>
    </aside>

    <main>
        <section class="summary">
            <div class="card highlight">Account Balance: ₹50,000</div>
            <div class="card">Savings Account</div>
            <div class="card">Credit Card</div>
        </section>

        <section>
            <h2>Recent Transactions</h2>
            <table>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
                <tr class="debit">
                    <td>25 Feb</td>
                    <td>Shopping</td>
                    <td>-₹2000</td>
                </tr>
                <tr class="credit">
                    <td>24 Feb</td>
                    <td>Salary</td>
                    <td>+₹50,000</td>
                </tr>
            </table>
        </section>

        <section>
            <h2>Login Form</h2>
            <form>
                <label>Username:</label>
                <input type="text" required><br><br>
                <label>Password:</label>
                <input type="password" required><br><br>
                <button>Login</button>
                <p style="color:red;">Warning: Multiple failed attempts!</p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 SecureBank</p>
    </footer>
</body>
</html>
