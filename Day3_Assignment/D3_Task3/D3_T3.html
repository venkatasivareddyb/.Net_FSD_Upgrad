<!DOCTYPE html>
<html lang="en">
<head>
    <title>ShopEasy - Product Listing</title>
    <link rel="stylesheet" href="D3_T3_style.css">
</head>
<body>
    <header>
        <h1>ShopEasy</h1>
        <nav>
            <ul>
                <li>Home</li>
                <li>Products</li>
                <li>Cart</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>

    <aside>
        <h2>Filters</h2>
        <label><input type="checkbox"> Electronics</label><br>
        <label><input type="checkbox"> Fashion</label><br>
        <label><input type="checkbox"> Home</label><br>
    </aside>

    <main>
        <section class="product-grid">
            <div class="product-card">
                <img src="p1.jpg" alt="Product 1">
                <h3>Product 1 <span style="color:red;">Limited Offer</span></h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p2.jpg" alt="Product 2">
                <h3>Product 2</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p3.jpg" alt="Product 3">
                <h3>Product 3</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p4.jpg" alt="Product 4">
                <h3>Product 4</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p5.jpg" alt="Product 5">
                <h3>Product 5</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p6.jpg" alt="Product 6">
                <h3>Product 6</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p7.jpg" alt="Product 7">
                <h3>Product 7</h3>
                <button>Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="p8.jpg" alt="Product 8">
                <h3>Product 8</h3>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>

    <section id="cart">
        <h2>Shopping Cart Summary</h2>
        <p>No items added yet.</p>
    </section>

    <footer>
        <p>&copy; 2026 ShopEasy</p>
    </footer>
</body>
</html>
