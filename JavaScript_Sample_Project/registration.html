<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register for Event - EventSphere</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-dark text-white text-center py-3">
    <h1>Register for Event</h1>
    <nav class="mt-2">
      <a href="index.html" class="btn btn-secondary me-2">Home</a>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="container my-4">
    <h2 class="mb-4">Registration Form</h2>
    <form id="registrationForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="participantName" class="form-label">Name</label>
        <input type="text" class="form-control" id="participantName" name="participantName" required>
        <div class="invalid-feedback">Name is required.</div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
        <div class="invalid-feedback">Please enter a valid email.</div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input type="tel" class="form-control" id="phone" name="phone" pattern="\\d{10}" required>
        <div class="invalid-feedback">Phone must be 10 digits.</div>
      </div>

      <div class="mb-3">
        <label for="eventId" class="form-label">Select Event</label>
        <select class="form-select" id="eventId" name="eventId" required>
          <!-- Options will be loaded dynamically from JSON Server -->
        </select>
        <div class="invalid-feedback">Please select an event.</div>
      </div>

      <button type="submit" class="btn btn-success">Register</button>
    </form>

    <div id="message" class="mt-3"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p>&copy; 2026 EventSphere</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script type="module" src="js/controllers/registrationController.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
