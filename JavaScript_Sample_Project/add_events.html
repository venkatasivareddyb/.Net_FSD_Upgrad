<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Event - EventSphere</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-dark text-white text-center py-3">
    <h1>Add New Event</h1>
    <nav class="mt-2">
      <a href="index.html" class="btn btn-secondary me-2">Home</a>
      
    </nav>
  </header>

  <!-- Main Content -->
  <main class="container my-4">
    <h2 class="mb-4">Event Details</h2>
    <form id="eventForm" class="needs-validation" novalidate>
      <div class="mb-3">
        <label for="title" class="form-label">Event Title</label>
        <input type="text" class="form-control" id="title" name="title" required>
        <div class="invalid-feedback">Title is required.</div>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
        <div class="invalid-feedback">Description is required.</div>
      </div>

      <div class="mb-3">
        <label for="date" class="form-label">Date</label>
        <input type="date" class="form-control" id="date" name="date" required>
        <div class="invalid-feedback">Please select a valid date.</div>
      </div>

      <div class="mb-3">
        <label for="location" class="form-label">Location</label>
        <input type="text" class="form-control" id="location" name="location" required>
        <div class="invalid-feedback">Location is required.</div>
      </div>

      <div class="mb-3">
        <label for="capacity" class="form-label">Capacity</label>
        <input type="number" class="form-control" id="capacity" name="capacity" min="1" required>
        <div class="invalid-feedback">Capacity must be a positive number.</div>
      </div>

      <button type="submit" class="btn btn-success">Add Event</button>
    </form>

    <div id="message" class="mt-3"></div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-4">
    <p>&copy; 2026 EventSphere</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script type="module" src="js/controllers/eventController.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
